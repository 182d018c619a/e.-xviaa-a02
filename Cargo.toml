[package]
name = "rusty-sentinel"
version = "0.1.0"
edition = "2021"

[dependencies]
# Jantung untuk async (Wajib untuk #[tokio::main])
tokio = { version = "1", features = ["full"] }

# Untuk kirim HTTP request (Wajib untuk reqwest::Client)
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }

# Untuk memproses banyak request sekaligus (Wajib untuk stream)
futures = "0.3"

# Untuk warna di terminal (Wajib untuk .red(), .green())
colored = "2"
